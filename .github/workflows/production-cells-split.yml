name: Cells-Production-Split

on:
  workflow_dispatch:
  repository_dispatch:
    types: [production-complete, dispatch-receiver]

jobs:
  deploy:
    runs-on: macos-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_PROD_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_PROD_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: https://s3.dynabic.com
      AWS_EC2_METADATA_DISABLED: "true"

    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        configure_one_product:
          #- sharepoint
          #- python-net
          #- python-java
          #- php-java
          #- family
          #- jasperreports
          #- java
          - net
          #- cpp
          #- android-java
          #- reporting-services
          #- nodejs-java
          #- nodejs-cpp
          #- go-cpp
          #- javascript-cpp

    steps:
      - name: Checkout theme repo
        uses: actions/checkout@main
        with:
          repository: Aspose/products.aspose.com
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.110.0'
          extended: true

      - name: Install Node.js Dependencies
        run: npm install

      - name: Install autoprefixer
        run: npm install -D --save autoprefixer

      - name: Install postcss-cli
        run: npm install -D --save postcss-cli

      - name: Configure build environment
        env:
          CONFIGURE_ONE_PRODUCT: ${{ matrix.configure_one_product }}
        run: npm run configure

      - name: Display config.json
        run: cat /Users/runner/work/products.aspose.com-workflows/products.aspose.com-workflows/config.json

      - name: Build Cells
        run: hugo --config "configs/cells.toml","config.json" -c "content/cells" -b "https://products.aspose.com/cells" --cleanDestinationDir --minify

      - name: Prepare public folder
        run: |
          find /Users/runner/work/products.aspose.com-workflows/products.aspose.com-workflows/public -iname 'sitemap.xml' -execdir mv -i '{}' ${{ matrix.configure_one_product }}.xml \;
          mv /Users/runner/work/products.aspose.com-workflows/products.aspose.com-workflows/total.cells.sitemap public/sitemap.xml

      - name: Force S3 path-style addressing for Ceph
        run: aws configure set default.s3.addressing_style path

      - name: Sync to Ceph S3 Bucket
        run: |
          set -euo pipefail
          echo "Deploying to Ceph S3 bucket..."
          echo "Endpoint: $AWS_ENDPOINT_URL"
          test -n "${AWS_ENDPOINT_URL:-}" || (echo "AWS_ENDPOINT_URL is empty" && exit 1)

          aws s3 sync ./public/ s3://products-aspose-com/cells/ \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            --acl public-read \
            --exclude ".gitignore" \
            --page-size 100 \
            --cli-read-timeout 300 \
            --cli-connect-timeout 60

      - name: Purge BunnyCDN
        if: success()
        run: |
          curl -siG \
            -H "X-Api-Key: ${{ secrets.BUNNY_API_KEY }}" \
            --data-urlencode "url=https://products.aspose.com/*" \
            "https://api.dynabic.com/bn/purge?async=true"