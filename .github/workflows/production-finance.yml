name: Finance-Production

on:
  repository_dispatch:
    types: [production-complete]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout theme repo
      uses: actions/checkout@main
      with:
          repository: Aspose/products.aspose.com
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0 
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
          hugo-version: 'latest'
          extended: true
    - name: Install autoprefixer
      run:  npm install -D --save autoprefixer
    - name: Install postcss-cli
      run:  npm install -D --save postcss-cli
    - name: Find and replace url param in frontmatter
      uses: jacobtomlinson/gha-find-replace@v2
      with:
        find: "url:"
        replace: "url_ignore:"
        include: "_index.md"
    - name: Find and replace image url domain
      uses: jacobtomlinson/gha-find-replace@v2
      with:
        find: "logoImageSrc=\"https://www.aspose.cloud/"
        replace: "logoImageSrc=\"https://cms.admin.containerize.com/"
        include: "_index.md"
    - name: Build Finance
      run: hugo --config "configs/finance.toml" -c "content/finance" -b "https://products.aspose.com/finance" --cleanDestinationDir --minify
    - name: Force S3 path-style addressing for Ceph
      run: aws configure set default.s3.addressing_style path

    - name: Sync to Ceph S3 Bucket
      run: |
        set -euo pipefail
        echo "Deploying to Ceph S3 bucket..."
        echo "Endpoint: $AWS_ENDPOINT_URL"
        test -n "${AWS_ENDPOINT_URL:-}" || (echo "AWS_ENDPOINT_URL is empty" && exit 1)

        aws s3 sync ./public/ s3://products-aspose-com/finance/ \
          --endpoint-url "$AWS_ENDPOINT_URL" \
          --delete \
          --size-only \
          --exclude ".gitignore" \
          --page-size 100 \
          --cli-read-timeout 300 \
          --cli-connect-timeout 60

    - name: Purge BunnyCDN
      if: success()
      run: |
        curl -siG \
          -H "X-Api-Key: ${{ secrets.BUNNY_API_KEY }}" \
          --data-urlencode "url=https://products.aspose.com/finance/*" \
          "https://api.dynabic.com/bn/purge?async=true" || true
