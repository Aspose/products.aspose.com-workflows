name: Home-Production-Ceph

on:
  repository_dispatch:
    types: [production-complete]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_PROD_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_PROD_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_ENDPOINT_URL: https://s3.dynabic.com

    steps:
      - name: Checkout site repo (sparse)
        uses: actions/checkout@v4
        with:
          repository: Aspose/products.aspose.com
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            content/home
            layouts
            themes
            assets
            static
            data
            i18n
            package.json
            package-lock.json
            postcss.config.js
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.110.0'
          extended: true

      - name: Install Node.js dependencies
        run: npm install

      - name: Install PostCSS dependencies
        run: npm install -D autoprefixer postcss postcss-cli

      - name: Find and replace url param in frontmatter
        uses: jacobtomlinson/gha-find-replace@v2
        with:
          find: "url:"
          replace: "url_ignore:"
          include: "_index.md"

      - name: Find and replace image url domain
        uses: jacobtomlinson/gha-find-replace@v2
        with:
          find: 'logoImageSrc="https://www.aspose.cloud/'
          replace: 'logoImageSrc="https://cms.admin.containerize.com/'
          include: "_index.md"

      - name: Build Home
        run: hugo --config "configs/home.toml" -c "content" -b "https://products.aspose.com/" --cleanDestinationDir --minify --disableKinds 404

      - name: Prepare public folder
        run: |
          if [ -f home-ru.sitemap ]; then
            mv home-ru.sitemap public/ru-sitemaps.xml
          else
            echo "home-ru.sitemap not found, skipping rename"
          fi

      - name: Test Ceph endpoint connectivity
        run: |
          echo "Testing endpoint: $AWS_ENDPOINT_URL"
          curl -I --max-time 20 "$AWS_ENDPOINT_URL" || true
          aws s3 ls --endpoint-url "$AWS_ENDPOINT_URL" || true

      - name: Sync to Ceph S3 Bucket
        run: |
          echo "Deploying to Ceph S3 bucket..."
          aws s3 sync ./public/ s3://products-aspose-com/ \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            --delete
