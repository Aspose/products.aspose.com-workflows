name: Total-Production-Split

on:
  workflow_dispatch:
  repository_dispatch:
    types: [production-complete]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_PROD_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_PROD_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: https://s3.dynabic.com
      AWS_EC2_METADATA_DISABLED: "true"

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        configure_one_product:
          - sharepoint
          - python-net
          - python-java
          - family
          - jasperreports
          - java
          - net
          - cpp
          - android-java
          - reporting-services
          - nodejs-java
          - php-java
          - javascript-cpp
          - nodejs-cpp
          - nodejs-net
          - go-cpp
    steps:
      - name: Checkout site repo (sparse)
        uses: actions/checkout@v5
        with:
          repository: Aspose/products.aspose.com
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            content/total
            layouts
            themes
            assets
            static
            data
            i18n
            package.json
            package-lock.json
            postcss.config.js
            config
            scripts
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          package-manager-cache: false

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.110.0'
          extended: true

      - name: Install Node.js dependencies
        run: npm install

      - name: Install PostCSS dependencies
        run: npm install -D autoprefixer postcss postcss-cli

      - name: Configure build environment
        env:
          CONFIGURE_ONE_PRODUCT: ${{ matrix.configure_one_product }}
        run: npm run configure

      - name: Display config.json
        run: cat config.json

      - name: Sanity check endpoint value
        run: |
          echo "Endpoint: $AWS_ENDPOINT_URL"

      - name: Build Total
        run: |
          hugo --config "configs/total.toml,config.json" \
            -c "content/total" \
            -b "https://products.aspose.com/total" \
            --cleanDestinationDir \
            --minify \
            --templateMetrics \
            --templateMetricsHints \
            --enableGitInfo

      - name: Prepare public folder
        run: |
          find public -iname 'sitemap.xml' -execdir mv -i '{}' "${{ matrix.configure_one_product }}.xml" \;
          if [ -f total.sitemap ]; then
            mv total.sitemap public/sitemap.xml
          fi
          if [ -f total.rss ]; then
            mv total.rss public/index.xml
          fi

      - name: Force S3 path-style addressing for Ceph
        run: |
          aws configure set default.s3.addressing_style path

      - name: Sync to Ceph S3 Bucket
        run: |
          set -euo pipefail
          echo "Deploying to Ceph S3 bucket..."
          echo "Endpoint: $AWS_ENDPOINT_URL"
          test -n "${AWS_ENDPOINT_URL:-}" || (echo "AWS_ENDPOINT_URL is empty" && exit 1)

          echo "📂 Listing top-level of ./content"
          ls -lah ./content

          echo "📂 Folder structure (2 levels)"
          find ./content -maxdepth 2 -type d

          if [ -d "./content/total" ]; then
          echo "✅ Found ./content/total"
          else
            echo "❌ ./content/total NOT found"
          fi

          echo "📂 Parent directory:"
          ls -lah ..    

          echo "📂 All folders (2 levels):"
          find . -maxdepth 2 -type d          

      - name: Purge Bunny cache for product
        if: success()
        run: |
          curl -siG \
            -H "X-Api-Key: ${{ secrets.BUNNY_API_KEY }}" \
            --data-urlencode "url=https://products.aspose.com/total/${{ matrix.configure_one_product }}/" \
            "https://api.dynabic.com/bn/purge?async=true" || true
